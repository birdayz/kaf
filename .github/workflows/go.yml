name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ^1.24
        cache: true

    - name: Build
      run: go build -v -ldflags "-s -w -X main.version=${{ github.ref_name }} -X main.commit=${GITHUB_SHA::8}" ./cmd/kaf

    - name: Vet
      run: go vet ./...

    - name: Test
      run: go test -v -short ./...
